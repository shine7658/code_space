<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠軌跡 - 環保生活管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-transparent py-4 position-relative">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-green m-0 fs-3" href="index.html">
                <i class="bi bi-tree-fill me-2"></i>綠軌跡
            </a>
            <button class="btn btn-dark fw-bold btn-lg px-4 py-2 fs-4" style="border-radius: 12px; position: absolute; top: 20px; right: 40px; padding: 12px 28px !important; z-index: 999;" id="menu-open-btn">
                <i class="bi bi-list me-2 fs-4"></i>選單
            </button>
        </div>
    </nav>

    <div id="full-screen-menu" class="fullscreen-overlay" style="position: fixed;">
        <div class="menu-content">
            <div class="menu-links">
                <a href="index.html" class="menu-item active">
                    <span class="menu-number">01</span>
                    <i class="bi bi-check2-circle me-3"></i>每日打卡首頁
                </a>
                <a href="achievements.html" class="menu-item">
                    <span class="menu-number">02</span>
                    <i class="bi bi-trophy me-3"></i>環保成就看板
                </a>
                <a href="history.html" class="menu-item">
                    <span class="menu-number">03</span>
                    <i class="bi bi-bar-chart-line me-3"></i>環保足跡歷史
                </a>
                <a href="summary.html" class="menu-item">
                    <span class="menu-number">04</span>
                    <i class="bi bi-file-earmark-person me-3"></i>永續生活報表
                </a>
            </div>
        </div>
    </div>

    <div class="container mt-2">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card p-4 text-center mb-4">
                    <h4 class="fw-bold text-green mb-3 text-start"><i class="bi bi-heart-fill me-2"></i>植物階段與積分</h4>
                    <div id="plant-container" class="plant-box p-4 mb-3">
                        <div id="plant-icon" class="plant-stage">🌱</div>
                        <h4 id="plant-level" class="fw-bold mt-3 text-green mb-0 fs-4">等級：種子階段</h4>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-2 small fw-bold text-muted">
                        <span>目前綠能：<span id="current-score" class="text-green fs-3">0</span> XP</span>
                        <span id="completion-rate" class="align-self-end text-success">已完成 0%</span>
                    </div>
                    <div class="progress mb-4" style="height: 12px;">
                        <div id="score-progress" class="progress-bar progress-bar-striped progress-bar-animated shadow-inner" role="progressbar" style="width: 0%"></div>
                    </div>

                    <div class="row g-3 pt-3 border-top">
                        <div class="col-6">
                            <div class="stat-box">
                                <small class="text-muted d-block mb-1 fw-bold fs-5"><i class="bi bi-cloud-arrow-down-fill text-success me-1"></i>預估減碳總量</small>
                                <strong class="display-6 mb-0 text-success fw-bold" id="carbon-text">0.0</strong> <small class="text-muted fw-bold">kg</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="stat-box">
                                <small class="text-muted d-block mb-1 fw-bold fs-5"><i class="bi bi-lightning-charge-fill text-warning me-1"></i>連續響應天數</small>
                                <strong class="display-6 mb-0 text-dark fw-bold">1</strong> <small class="text-muted">天</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card p-3 bg-white border border-light mb-4">
                    <div class="d-flex align-items-start text-muted px-2">
                        <i class="bi bi-lightbulb-fill fs-4 text-warning me-3 mt-1"></i>
                        <div>
                            <strong class="text-dark d-block small mb-1 fw-bold">今日減碳生活指南</strong>
                            <small id="quote-text" class="fw-medium text-secondary"></small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card p-4 mb-4 bg-white border border-success border-opacity-10">
                    <h5 class="fw-bold text-green mb-3"><i class="bi bi-magic me-2 text-success"></i>規劃你的環保微行動</h5>
                    <form id="add-task-form" class="row g-2 mb-3">
                        <div class="col-md-10">
                            <input type="text" id="new-task-text" class="form-control py-2" style="border-radius: 10px;" placeholder="輸入自訂行動（系統將自動感應辨識分類與防呆）..." required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-success w-100 fw-bold py-2" style="border-radius: 10px; background-color: #2e6f40; border-color: #2e6f40;">新增</button>
                        </div>
                    </form>

                    <div class="d-flex align-items-center flex-wrap gap-2 pt-2 border-top">
                        <small class="text-muted fw-bold me-2" style="font-size: 0.95rem;">常用快捷：</small>
                        <button type="button" class="btn btn-sm btn-outline-secondary px-3 py-2 fs-6 fw-bold text-dark quick-btn" data-text="自備環保杯購買飲料" style="border-radius: 10px; background: #f8fafc;">🥤 隨手飲料</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary px-3 py-2 fs-6 fw-bold text-dark quick-btn" data-text="今日實行一餐吃蔬食（無肉飲食）" style="border-radius: 10px; background: #f8fafc;">🥗 蔬食午餐</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary px-3 py-2 fs-6 fw-bold text-dark quick-btn" data-text="搭乘大眾運輸工具或騎乘 YouBike" style="border-radius: 10px; background: #f8fafc;">🚲 低碳通勤</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary px-3 py-2 fs-6 fw-bold text-dark quick-btn" data-text="隨手關閉不必要的房間/教室電源" style="border-radius: 10px; background: #f8fafc;">💡 隨手關燈</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary px-3 py-2 fs-6 fw-bold text-dark quick-btn" data-text="隨手拔掉閒置電器的幽靈插頭" style="border-radius: 10px; background: #f8fafc;">🔌 拔除插頭</button>
                    </div>
                </div>

                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold text-green mb-0"><i class="bi bi-check2-square me-2 text-success"></i>每日行動清單</h5>
                        <button class="btn btn-sm btn-outline-secondary px-3" style="border-radius: 8px;" id="btn-reset">重設狀態</button>
                    </div>
                    <div id="task-list" class="d-flex flex-column gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        const menuOverlay = document.getElementById('full-screen-menu');
        const menuOpenBtn = document.getElementById('menu-open-btn');

        menuOpenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuOverlay.classList.add('open');
        });

        menuOverlay.addEventListener('click', (event) => {
            if (!event.target.closest('.menu-links')) {
                menuOverlay.classList.remove('open');
            }
        });

        function checkNightMode() {
            const currentHour = new Date().getHours();
            if (currentHour >= 23 || currentHour < 5) {
                document.body.classList.add('eco-dark-mode');
            } else {
                document.body.classList.remove('eco-dark-mode');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkNightMode();
        });
    </script>
</body>
</html>
