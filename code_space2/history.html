<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠軌跡 - 環保足跡歷史</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background-color: #fafbfc; 
        }
        
        .hero-section {
            background: linear-gradient(135deg, #164e63 0%, #2e6f40 100%);
            border-radius: 24px; 
            color: white; 
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dashboard-card {
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
            transition: all 0.3s ease;
        }
        .dashboard-card:hover {
            box-shadow: 0 10px 30px rgba(46, 111, 64, 0.03);
        }
        
        .timeline { border-left: 3px solid #cbd5c5; padding-left: 24px; position: relative; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -32px; top: 12px;
            width: 14px; height: 14px; background-color: #2e6f40;
            border-radius: 50%; border: 3px solid #ffffff; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
        }
        .timeline-card {
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            transition: all 0.25s ease;
        }
        .timeline-card:hover {
            transform: translateX(4px);
            border-color: #cbd5c5;
            background-color: #f4f7f4;
        }
        
        .chart-svg {
            width: 100%; height: 210px; overflow: visible;
        }
        .trend-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }
        
        .pie-donut {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.03));
            flex-shrink: 0;
        }
        .pie-segment {
            transition: stroke-dasharray 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-label-box {
            padding: 12px 18px; 
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            white-space: nowrap;
        }

        .data-label-text {
            fill: #0f172a !important; 
            font-size: 14px !important;
            font-weight: 800 !important;
            opacity: 0;
            animation: fadeInLabel 1s ease-out 1s forwards;
        }
        
        body.eco-dark-mode .data-label-text {
            fill: #38bdf8 !important; 
        }

        @keyframes fadeInLabel {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-transparent py-4 position-relative">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-green m-0 fs-3" href="index.html">
                <i class="bi bi-tree-fill me-2"></i>綠軌跡
            </a>
            <button class="btn btn-dark fw-bold btn-lg px-4 py-2 fs-4" style="border-radius: 12px; position: absolute; top: 20px; right: 40px; padding: 12px 28px !important; z-index: 999;" id="menu-open-btn">
                <i class="bi bi-list me-2 fs-4"></i>選單
            </button>
        </div>
    </nav>

    <div id="full-screen-menu" class="fullscreen-overlay" style="position: fixed;">
        <div class="menu-content">
            <div class="menu-links">
                <a href="index.html" class="menu-item">
                    <span class="menu-number">01</span>
                    <i class="bi bi-check2-circle me-3"></i>每日打卡首頁
                </a>
                <a href="achievements.html" class="menu-item">
                    <span class="menu-number">02</span>
                    <i class="bi bi-trophy me-3"></i>環保成就看板
                </a>
                <a href="history.html" class="menu-item active">
                    <span class="menu-number">03</span>
                    <i class="bi bi-bar-chart-line me-3"></i>環保足跡歷史
                </a>
                <a href="summary.html" class="menu-item">
                    <span class="menu-number">04</span>
                    <i class="bi bi-file-earmark-person me-3"></i>永續生活報表
                </a>
            </div>
        </div>
    </div>

    <div class="container mt-2 mb-5">
        <div class="hero-section text-center mb-4 shadow-sm">
            <h2 class="fw-bold mb-3 text-center display-6"><i class="bi bi-bar-chart-line-fill text-warning me-2"></i>永續數據 Dashboard</h2>
            <p class="text-white-50 mb-0 fw-medium text-center fs-5" style="max-width: 650px;">透視你的綠色生活，將每日微行動轉化為視覺化減碳指標。</p>
        </div>

        <div class="card p-4 bg-white border border-success border-opacity-10">
            <div class="row g-4">
                
                <div class="col-lg-6 col-12">
                    <div class="card dashboard-card p-4 mb-4 border-0 bg-light bg-opacity-10">
                        <h5 class="fw-bold text-green mb-4 fs-4"><i class="bi bi-pie-chart-fill me-2"></i>行動領域分佈比例</h5>
                        <div style="display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: flex-start !important; padding: 10px 0; flex-wrap: wrap; gap: 20px;">
                            
                            <svg width="180" height="180" viewBox="0 0 42 42" class="pie-donut mx-auto mx-md-0">
                                <circle class="pie-hole" cx="21" cy="21" r="15.915" fill="#fff"></circle>
                                <circle class="pie-ring" cx="21" cy="21" r="15.915" fill="transparent" stroke="#f1f5f9" stroke-width="4.5"></circle>
                                <circle id="segment-diet" class="pie-segment" cx="21" cy="21" r="15.915" fill="transparent" stroke="#0d9488" stroke-width="4.5" stroke-dasharray="0 100" stroke-dashoffset="0"></circle>
                                <circle id="segment-traffic" class="pie-segment" cx="21" cy="21" r="15.915" fill="transparent" stroke="#0284c7" stroke-width="4.5" stroke-dasharray="0 100" stroke-dashoffset="0"></circle>
                                <circle id="segment-energy" class="pie-segment" cx="21" cy="21" r="15.915" fill="transparent" stroke="#d97706" stroke-width="4.5" stroke-dasharray="0 100" stroke-dashoffset="0"></circle>
                            </svg>
                            
                            <div style="display: flex !important; flex-direction: column !important; gap: 14px !important; flex-grow: 1 !important; min-width: 200px !important;">
                                <div class="stat-label-box tag-diet">
                                    <span class="fw-bold">🌱 飲食減塑</span><span id="lbl-diet-pc" class="ms-3 fs-5 fw-bold">0%</span>
                                </div>
                                <div class="stat-label-box tag-traffic">
                                    <span class="fw-bold">🚌 低碳交通</span><span id="lbl-traffic-pc" class="ms-3 fs-5 fw-bold">0%</span>
                                </div>
                                <div class="stat-label-box tag-energy">
                                    <span class="fw-bold">💡 隨手節能</span><span id="lbl-energy-pc" class="ms-3 fs-5 fw-bold">0%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card dashboard-card p-4 border-0 bg-light bg-opacity-10" style="overflow-x: auto;">
                        <h5 class="fw-bold text-green mb-4 fs-4"><i class="bi bi-graph-up-arrow me-2"></i>近七日累計減碳趨勢 (kg)</h5>
                        <div class="py-2" style="min-width: 400px;">
                            <svg id="trend-svg-canvas" class="chart-svg" viewBox="0 0 600 200">
                                <line x1="0" y1="50" x2="600" y2="50" stroke="#f8fafc" stroke-width="1.5"></line>
                                <line x1="0" y1="100" x2="600" y2="100" stroke="#f8fafc" stroke-width="1.5"></line>
                                <line x1="0" y1="150" x2="600" y2="150" stroke="#f8fafc" stroke-width="1.5"></line>
                                <line x1="0" y1="190" x2="600" y2="190" stroke="#e2e8f0" stroke-width="2"></line>
                                <path id="trend-line" class="trend-path" d="M 50 190" fill="none" stroke="#2e6f40" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                <text x="35" y="215" fill="#64748b" font-size="14" font-weight="800">Mon</text>
                                <text x="125" y="215" fill="#64748b" font-size="14" font-weight="800">Tue</text>
                                <text x="215" y="215" fill="#64748b" font-size="14" font-weight="800">Wed</text>
                                <text x="305" y="215" fill="#64748b" font-size="14" font-weight="800">Thu</text>
                                <text x="395" y="215" fill="#64748b" font-size="14" font-weight="800">Fri</text>
                                <text x="485" y="215" fill="#64748b" font-size="14" font-weight="800">Sat</text>
                                <text x="555" y="215" fill="#64748b" font-size="14" font-weight="800">Sun</text>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6 col-12">
                    <div class="card dashboard-card p-4 h-100 border-0 bg-light bg-opacity-10">
                        <h5 class="fw-bold text-green mb-4 fs-4"><i class="bi bi-clock-history me-2"></i>已實踐的行動足跡</h5>
                        <div id="history-timeline" class="timeline px-2">
                            <div class="text-center py-5 text-muted" id="no-history-text">
                                <i class="bi bi-inboxes fs-1 d-block mb-2 opacity-50"></i>
                                目前尚未勾選完成 any 環保任務喔！
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const menuOverlay = document.getElementById('full-screen-menu');
        const menuOpenBtn = document.getElementById('menu-open-btn');

        menuOpenBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuOverlay.classList.add('open');
        });

        menuOverlay.addEventListener('click', (event) => {
            if (!event.target.closest('.menu-links')) {
                menuOverlay.classList.remove('open');
            }
        });

        function checkNightMode() {
            const currentHour = new Date().getHours();
            if (currentHour >= 23 || currentHour < 5) {
                document.body.classList.add('eco-dark-mode');
            } else {
                document.body.classList.remove('eco-dark-mode');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkNightMode();
            const savedState = JSON.parse(localStorage.getItem('ecoStepState'));
            
            if (savedState && savedState.tasks) {
                const completedTasks = savedState.tasks.filter(t => t.completed);
                
                if (completedTasks.length > 0) {
                    document.getElementById('no-history-text').style.display = 'none';
                    const timelineContainer = document.getElementById('history-timeline');
                    
                    let dietCount = 0; let trafficCount = 0; let energyCount = 0;

                    completedTasks.forEach(task => {
                        if (task.category === "飲食") dietCount++;
                        if (task.category === "交通") trafficCount++;
                        if (task.category === "節能") energyCount++;

                        const item = document.createElement('div');
                        item.className = 'timeline-item';
                        item.innerHTML = `
                            <div class="card p-3 timeline-card shadow-none mb-0">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="category-tag ${task.tagClass}" style="font-size:0.85rem; padding: 5px 12px;">${task.category}</span>
                                    <small class="fw-bold text-success fs-5">+${task.points} XP</small>
                                </div>
                                <div class="fw-bold text-dark fs-5" style="letter-spacing:0.2px;">${task.text}</div>
                            </div>
                        `;
                        timelineContainer.appendChild(item);
                    });

                    const total = completedTasks.length;
                    const dietPercent = Math.round((dietCount / total) * 100);
                    const trafficPercent = Math.round((trafficCount / total) * 100);
                    const energyPercent = Math.round((energyCount / total) * 100);

                    document.getElementById('lbl-diet-pc').innerText = `${dietPercent}% (${dietCount}項)`;
                    document.getElementById('lbl-traffic-pc').innerText = `${trafficPercent}% (${trafficCount}項)`;
                    document.getElementById('lbl-energy-pc').innerText = `${energyPercent}% (${energyCount}項)`;

                    const segDiet = document.getElementById('segment-diet');
                    const segTraffic = document.getElementById('segment-traffic');
                    const segEnergy = document.getElementById('segment-energy');

                    segDiet.setAttribute('stroke-dasharray', `${dietPercent} 100`);
                    segTraffic.setAttribute('stroke-dasharray', `${trafficPercent} 100`);
                    segTraffic.setAttribute('stroke-dashoffset', `-${dietPercent}`);
                    segEnergy.setAttribute('stroke-dasharray', `${energyPercent} 100`);
                    segEnergy.setAttribute('stroke-dashoffset', `-${dietPercent + trafficPercent}`);

                    const currentCarbon = savedState.score * 0.12;
                    const p1 = (currentCarbon * 0.15).toFixed(1);
                    const p2 = (currentCarbon * 0.35).toFixed(1);
                    const p3 = (currentCarbon * 0.40).toFixed(1);
                    const p4 = (currentCarbon * 0.65).toFixed(1);
                    const p5 = (currentCarbon * 0.80).toFixed(1);
                    const p6 = (currentCarbon * 0.90).toFixed(1);
                    const p7 = currentCarbon.toFixed(1);

                    const calcY = (val) => {
                        if (currentCarbon === 0) return 190;
                        return 190 - (val / currentCarbon) * 150;
                    };

                    const xCoords = [50, 140, 230, 320, 410, 500, 570];
                    const yValues = [p1, p2, p3, p4, p5, p6, p7];

                    const pathString = `M ${xCoords[0]} ${calcY(yValues[0])} L ${xCoords[1]} ${calcY(yValues[1])} L ${xCoords[2]} ${calcY(yValues[2])} L ${xCoords[3]} ${calcY(yValues[3])} L ${xCoords[4]} ${calcY(yValues[4])} L ${xCoords[5]} ${calcY(yValues[5])} L ${xCoords[6]} ${calcY(yValues[6])}`;
                    document.getElementById('trend-line').setAttribute('d', pathString);

                    const svgCanvas = document.getElementById('trend-svg-canvas');
                    
                    xCoords.forEach((x, index) => {
                        const val = yValues[index];
                        const y = calcY(val);

                        const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        textNode.setAttribute("x", x);
                        textNode.setAttribute("y", y - 12);
                        textNode.setAttribute("text-anchor", "middle");
                        textNode.setAttribute("class", "data-label-text");
                        textNode.textContent = `${val}kg`;

                        svgCanvas.appendChild(textNode);
                    });
                }
            }
        });
    </script>
</body>
</html>
